<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Início</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topo">
    <h1>LarDoceLar</h1>
    <nav class="menu">
        <a href="index.html">Início</a>
        <a href="criar-anuncio.html">Criar Anúncio</a>
        <a href="meus-anuncios.html">Meus Anúncios</a>
    </nav>
</header>

<main>
<section>
    <h2>Imóveis disponíveis</h2>
    <div id="lista-casas"></div>
</section>
</main>

<script>
async function carregarCasas() {
    const res = await fetch("http://127.0.0.1:5000/casas");
    const casas = await res.json();

    const container = document.getElementById("lista-casas");
    container.innerHTML = "";

    casas.forEach(casa => {
        container.innerHTML += `
            <article>
                <img src="${casa.imagem}" onerror="this.src='https://via.placeholder.com/300'">
                <h3>${casa.titulo}</h3>
                <p>${casa.localizacao}</p>
                <p>R$ ${casa.preco}</p>
                <a href="anuncio.html?id=${casa.id}">Ver detalhes</a>
            </article>
        `;
    });
}

carregarCasas();
</script>

</body>
</html>

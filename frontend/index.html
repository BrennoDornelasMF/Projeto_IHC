<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Início</title>
    <link rel="stylesheet" href="style.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <header class="topo">
      <h1><a class="brand" href="index.html">LarDoceLar</a></h1>
      <nav class="menu">
        <a class="ativo" href="index.html">Início</a>
        <a href="criar-anuncio.html">Criar Anúncio</a>
        <a href="meus-anuncios.html">Meus Anúncios</a>
      </nav>
    </header>

    <main>
      <section>
        <p class="texto-topo-home">Aqui você compra ou vende seu imóvel</p>
        <h1 class="titulo-principal">Sinta-se em casa</h1>
        <h2 class="titulo-secao">Imóveis disponíveis</h2>
        <div id="lista-casas"></div>
      </section>

      <section id="grupos-imoveis">
        <div class="grupo-sequencia">
          <div class="grupo-sequencia-topo">
            <h2 class="titulo-secao">Casas</h2>
            <div class="grupo-controles">
              <button
                type="button"
                class="seta"
                data-target="grupo-casas"
                data-dir="left"
                aria-label="Voltar"
              >
                &#10094;
              </button>
              <button
                type="button"
                class="seta"
                data-target="grupo-casas"
                data-dir="right"
                aria-label="Avançar"
              >
                &#10095;
              </button>
            </div>
          </div>
          <div id="grupo-casas" class="trilho-sequencia"></div>
        </div>

        <div class="grupo-sequencia">
          <div class="grupo-sequencia-topo">
            <h2 class="titulo-secao">Apartamentos</h2>
            <div class="grupo-controles">
              <button
                type="button"
                class="seta"
                data-target="grupo-apartamentos"
                data-dir="left"
                aria-label="Voltar"
              >
                &#10094;
              </button>
              <button
                type="button"
                class="seta"
                data-target="grupo-apartamentos"
                data-dir="right"
                aria-label="Avançar"
              >
                &#10095;
              </button>
            </div>
          </div>
          <div id="grupo-apartamentos" class="trilho-sequencia"></div>
        </div>

        <div class="grupo-sequencia">
          <div class="grupo-sequencia-topo">
            <h2 class="titulo-secao">Flats</h2>
            <div class="grupo-controles">
              <button
                type="button"
                class="seta"
                data-target="grupo-flat"
                data-dir="left"
                aria-label="Voltar"
              >
                &#10094;
              </button>
              <button
                type="button"
                class="seta"
                data-target="grupo-flat"
                data-dir="right"
                aria-label="Avançar"
              >
                &#10095;
              </button>
            </div>
          </div>
          <div id="grupo-flat" class="trilho-sequencia"></div>
        </div>
      </section>
    </main>
  </body>
</html>

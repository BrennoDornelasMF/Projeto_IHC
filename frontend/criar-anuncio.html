<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Criar Anúncio</title>
    <link rel="stylesheet" href="style.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <header class="topo">
      <h1><a class="brand" href="index.html">LarDoceLar</a></h1>
      <nav class="menu">
        <a href="index.html">Início</a>
        <a class="ativo" href="criar-anuncio.html">Criar Anúncio</a>
        <a href="meus-anuncios.html">Meus Anúncios</a>
      </nav>
    </header>

    <main>
      <section class="secao-formulario">
        <h2 class="titulo-secao">Preencha os dados do imóvel</h2>
        <form class="form-anuncio" enctype="multipart/form-data">
          <input id="titulo" placeholder="Título" required />
          <input id="localizacao" placeholder="Localização" required />
          <input id="preco" placeholder="Preço" required />
          <textarea id="descricao" placeholder="Descrição"></textarea>

          <input
            type="file"
            id="imagem"
            accept="image/*"
            class="input-imagem"
          />
          <label
            for="imagem"
            class="botao-upload"
            aria-label="Adicionar imagem"
          >
            <span class="icone-upload" aria-hidden="true">&#8679;</span>
            <span>Adicionar Imagem</span>
          </label>

          <button type="submit" disabled>Publicar Imóvel</button>
        </form>
      </section>
    </main>
  </body>
</html>

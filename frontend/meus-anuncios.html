<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Meus Anúncios</title>
    <link rel="stylesheet" href="style.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <header class="topo">
      <h1><a class="brand" href="index.html">LarDoceLar</a></h1>
      <nav class="menu">
        <a href="index.html">Início</a>
        <a href="criar-anuncio.html">Criar Anúncio</a>
        <a class="ativo" href="meus-anuncios.html">Meus Anúncios</a>
      </nav>
    </header>

    <main>
      <section>
        <div id="lista"></div>
      </section>
    </main>

    <div
      id="modal-confirmacao"
      class="modal-confirmacao oculto"
      role="dialog"
      aria-modal="true"
      aria-labelledby="titulo-confirmacao"
    >
      <div class="modal-conteudo">
        <h3 id="titulo-confirmacao">Confirmar remoção</h3>
        <p>Tem certeza que deseja remover este anúncio?</p>
        <div class="modal-acoes">
          <button
            type="button"
            id="cancelar-remocao"
            class="botao-modal-cancelar"
          >
            Cancelar
          </button>
          <button
            type="button"
            id="confirmar-remocao"
            class="botao-modal-confirmar"
          >
            Remover anúncio
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
